<!DOCTYPE html>
<html>
<head>
    <title>AI Subtitle Generator</title>

    <style>
        body {
            background: black;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        video {
            width: 90%;
            max-width: 1000px;
            margin-top: 20px;
            border-radius: 10px;
        }

        #subtitleBox {
            width: 80%;
            max-width: 1000px;
            margin: 15px auto;
            padding: 12px 18px;

            background: rgba(0, 0, 0, 0.85);
            color: yellow;

            font-size: 28px;
            font-weight: 500;
            line-height: 1.5;

            text-align: center;
            border-radius: 6px;

            min-height: 40px;

            word-wrap: break-word;
            white-space: pre-wrap;

            opacity: 1;
            transition: all 0.2s ease-in-out;
        }

        .fade {
            opacity: 0;
            transform: translateY(5px);
        }

        .show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

<h2>🎬 AI Subtitle Generator</h2>

<input type="file" id="videoInput" accept="video/*">
<select id="language"></select>

<br><br>

<label>Font Size:</label>
<select id="fontSize">
    <option value="20px">Small</option>
    <option value="28px" selected>Medium</option>
    <option value="36px">Large</option>
    <option value="48px">Extra Large</option>
</select>

<label>Color:</label>
<select id="fontColor">
    <option value="yellow">Yellow</option>
    <option value="white">White</option>
    <option value="cyan">Cyan</option>
    <option value="lime">Lime</option>
    <option value="red">Red</option>
</select>

<label>Width:</label>
<select id="boxWidth">
    <option value="60%">Narrow</option>
    <option value="80%" selected>Normal</option>
    <option value="100%">Full</option>
</select>

<br><br>

<video id="videoPlayer" controls></video>
<div id="subtitleBox" class="show">Upload a video</div>

<script>

const video = document.getElementById("videoPlayer");
const subtitleBox = document.getElementById("subtitleBox");
const languageSelect = document.getElementById("language");
const videoInput = document.getElementById("videoInput");

const fontSizeControl = document.getElementById("fontSize");
const fontColorControl = document.getElementById("fontColor");
const boxWidthControl = document.getElementById("boxWidth");

let socket = null;
let interval = null;

// 🎨 Controls
fontSizeControl.onchange = () => {
    subtitleBox.style.fontSize = fontSizeControl.value;
};

fontColorControl.onchange = () => {
    subtitleBox.style.color = fontColorControl.value;
};

boxWidthControl.onchange = () => {
    subtitleBox.style.width = boxWidthControl.value;
};

// 🌍 Load languages
fetch("/languages")
.then(res => res.json())
.then(data => {
    for (let code in data) {
        let opt = document.createElement("option");
        opt.value = code;
        opt.textContent = data[code];
        languageSelect.appendChild(opt);
    }

    languageSelect.value = "en"; // default
});

// 📤 Upload + translate
videoInput.onchange = async function(e) {

    const file = e.target.files[0];
    if (!file) return;

    video.src = URL.createObjectURL(file);

    const formData = new FormData();
    formData.append("file", file);

    subtitleBox.innerText = "⏳ Uploading...";

    await fetch("/upload-video/", {
        method: "POST",
        body: formData
    });

    subtitleBox.innerText = "🌍 Translating...";

    await fetch("/generate-subtitles/?language=" + languageSelect.value, {
        method: "POST"
    });

    subtitleBox.innerText = "▶️ Click PLAY";
};

// ▶️ Play
video.addEventListener("play", () => {

    if (socket && socket.readyState === 1) return;

    const protocol = location.protocol === "https:" ? "wss" : "ws";
    socket = new WebSocket(`${protocol}://${location.host}/ws/subtitles`);

    socket.onopen = () => {

        interval = setInterval(() => {

            if (!socket || socket.readyState !== 1) return;

            socket.send(`time:${video.currentTime}`);

        }, 400);
    };

    socket.onmessage = (event) => {

        const newText = event.data || "";

        if (!newText.trim()) {
            subtitleBox.innerText = "";
            return;
        }

        if (newText !== subtitleBox.innerText) {

            subtitleBox.classList.remove("show");
            subtitleBox.classList.add("fade");

            setTimeout(() => {
                subtitleBox.innerText = newText;
                subtitleBox.classList.remove("fade");
                subtitleBox.classList.add("show");
            }, 80);
        }
    };

    socket.onclose = () => {
        clearInterval(interval);
    };
});

// ⏸ Pause
video.addEventListener("pause", () => {

    if (interval) {
        clearInterval(interval);
        interval = null;
    }

    if (socket) {
        socket.close();
        socket = null;
    }
});

</script>

</body>
</html>
